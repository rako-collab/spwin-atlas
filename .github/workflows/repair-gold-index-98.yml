name: Repair Gold Index to 98

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - tools/repair_gold_index_98.py

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Repair authoritative Gold index
        run: python3 tools/repair_gold_index_98.py

      - name: Run Gold integrity validation
        run: |
          python3 -m unittest discover -s tests -v
          python3 tools/validate_gold_replay_integrity.py
          python3 tools/run_spwin_v261_gold_replay.py

      - name: Commit repaired index
        run: |
          if git diff --quiet -- data/world_cup_2026/gold/MATCH_INDEX.json; then
            echo "MATCH_INDEX.json already repaired."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/world_cup_2026/gold/MATCH_INDEX.json
          git commit -m "data(gold): index nine completed knockout records"
          git push

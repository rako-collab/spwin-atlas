name: Repair Gold Index to 98

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - tools/repair_gold_index_98.py
      - .github/workflows/repair-gold-index-98.yml
      - data/world_cup_2026/gold/MATCH_INDEX.json

permissions:
  contents: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Repair authoritative Gold index
        run: python3 tools/repair_gold_index_98.py

      - name: Commit repaired index to pull-request branch
        run: |
          if git diff --quiet -- data/world_cup_2026/gold/MATCH_INDEX.json; then
            echo "MATCH_INDEX.json already repaired."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/world_cup_2026/gold/MATCH_INDEX.json
            git commit -m "data(gold): index nine completed knockout records"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Capture Gold integrity validation
        id: validate
        continue-on-error: true
        run: |
          set +e
          : > repair_validation.log
          echo '=== unittest ===' | tee -a repair_validation.log
          python3 -m unittest discover -s tests -v 2>&1 | tee -a repair_validation.log
          s1=${PIPESTATUS[0]}
          echo '=== gold replay integrity ===' | tee -a repair_validation.log
          python3 tools/validate_gold_replay_integrity.py 2>&1 | tee -a repair_validation.log
          s2=${PIPESTATUS[0]}
          echo '=== frozen v2.6.1 replay ===' | tee -a repair_validation.log
          python3 tools/run_spwin_v261_gold_replay.py 2>&1 | tee -a repair_validation.log
          s3=${PIPESTATUS[0]}
          echo "statuses: unittest=$s1 integrity=$s2 replay=$s3" | tee -a repair_validation.log
          test $s1 -eq 0 -a $s2 -eq 0 -a $s3 -eq 0

      - name: Commit validation report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add repair_validation.log
          if ! git diff --cached --quiet; then
            git commit -m "ci: capture Gold index validation output"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Fail when validation failed
        if: steps.validate.outcome != 'success'
        run: exit 1

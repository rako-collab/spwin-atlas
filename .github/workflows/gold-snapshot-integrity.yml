name: Gold snapshot integrity

on:
  push:
    branches: [main]
    paths:
      - 'data/world_cup_2026/gold/**'
      - 'tools/validate_gold_snapshot_integrity.py'
      - '.github/workflows/gold-snapshot-integrity.yml'
  pull_request:
    paths:
      - 'data/world_cup_2026/gold/**'
      - 'tools/validate_gold_snapshot_integrity.py'
      - '.github/workflows/gold-snapshot-integrity.yml'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run unit tests
        continue-on-error: true
        run: python3 -m unittest discover -s tests -v
      - name: Run snapshot-integrity validator
        run: python3 tools/validate_gold_snapshot_integrity.py
      - name: Run replay-integrity validator
        run: python3 tools/validate_gold_replay_integrity.py
      - name: Run frozen v2.6.1 replay
        run: python3 tools/run_spwin_v261_gold_replay.py
      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-handover-validation
          path: |
            reports/validation/
            reports/benchmark/spwin_v2_6_1_gold/
          if-no-files-found: warn

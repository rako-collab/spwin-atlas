name: SPWIN v2.6.1 Research Audits

on:
  pull_request:
    branches: [main]
    paths:
      - "tools/run_spwin_v261_borderline_audit.py"
      - "tools/run_spwin_v261_incomplete_data_audit.py"
      - "tools/run_spwin_v261_a1_robustness.py"
      - ".github/workflows/spwin-v261-borderline-audit.yml"
      - "spwin_engine/**"
      - "tests/**"
      - "data/world_cup_2026/gold/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile audit code
        run: |
          python -m py_compile \
            spwin_engine/integrity.py \
            spwin_engine/v260.py \
            spwin_engine/v261.py \
            tools/run_spwin_v261_borderline_audit.py \
            tools/run_spwin_v261_incomplete_data_audit.py \
            tools/run_spwin_v261_a1_robustness.py

      - name: Run replay integrity regression tests
        run: python -m unittest discover -s tests -v

      - name: Run authoritative 82-match replay and audit
        run: |
          python tools/run_spwin_v261_borderline_audit.py \
            --gold-dir data/world_cup_2026/gold \
            --bankroll 1000 \
            --out-dir reports/analysis/spwin_v261_borderline_82

      - name: Run incomplete-data signal audit
        run: |
          python tools/run_spwin_v261_incomplete_data_audit.py \
            --gold-dir data/world_cup_2026/gold \
            --out-dir reports/analysis/spwin_v261_incomplete_data

      - name: Run Experiment A1 robustness audit
        run: |
          python tools/run_spwin_v261_a1_robustness.py \
            --gold-dir data/world_cup_2026/gold \
            --out-dir reports/analysis/spwin_v261_a1_robustness

      - name: Upload borderline audit reports
        uses: actions/upload-artifact@v4
        with:
          name: spwin-v261-borderline-audit-82
          path: reports/analysis/spwin_v261_borderline_82/
          if-no-files-found: error

      - name: Upload incomplete-data audit reports
        uses: actions/upload-artifact@v4
        with:
          name: spwin-v261-incomplete-data-audit
          path: reports/analysis/spwin_v261_incomplete_data/
          if-no-files-found: error

      - name: Upload Experiment A1 robustness reports
        uses: actions/upload-artifact@v4
        with:
          name: spwin-v261-a1-robustness
          path: reports/analysis/spwin_v261_a1_robustness/
          if-no-files-found: error
